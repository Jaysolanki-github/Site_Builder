services:
  - type: web_service
    name: site-builder-backend
    env: node
    branch: main
    region: oregon
    plan: starter
    repo: .
    buildCommand: cd server && npm ci --include=dev && npm run build
    startCommand: cd server && node dist/server.js
    envVars:
      - name: NPM_CONFIG_PRODUCTION
        value: "false"
